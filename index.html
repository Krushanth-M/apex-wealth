        /* Monochromatic Color Themes via Custom Variables */

            --bg-color: #06020c;

            --card-border: rgba(168, 85, 247, 0.25);
            --border-color: rgba(168, 85, 247, 0.15);
            --text-color: #f5f3ff;
            --text-secondary: #d8b4fe;
            --primary: #d946ef;
            --primary-hover: #a21caf;
            --primary-rgb: 217, 70, 239;
            --primary-gradient: linear-gradient(135deg, #d946ef 0%, #8b5cf6 100%);
            --glow: rgba(217, 70, 239, 0.35);
            --input-bg: rgba(10, 5, 20, 0.9);
            --slider-runway: rgba(168, 85, 247, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(6, 2, 12, 0.5);
            --card-shadow-hover: 0 12px 40px rgba(217, 70, 239, 0.15);
        }

        /* Base Resets */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* CSS Animations */
        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Onboarding Guide glowing dots */
        .pulse-guide {
            position: relative;
            display: inline-flex;
        }
        .pulse-guide::after {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary);
            box-shadow: 0 0 0 0 var(--glow);
            animation: guideGlow 2s infinite;
        }
        @keyframes guideGlow {
            0% { box-shadow: 0 0 0 0 var(--glow); }
            70% { box-shadow: 0 0 0 6px rgba(var(--primary-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0); }
        }

        /* Custom tooltips */
        .tooltip-container {
            position: relative;
        }
        .tooltip-text {
            visibility: hidden;
            background-color: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            text-align: left;
            padding: 8px 12px;
            border-radius: 6px;
            position: absolute;
            z-index: 50;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.2s;
            width: 220px;
            font-size: 11px;
            line-height: 1.4;
            box-shadow: var(--glass-shadow);
        }
        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--card-border);
            border-radius: 3px;
        }

        /* Range Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--slider-runway);
            border-radius: 4px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 0 4px var(--glow);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 0 0 6px var(--glow);
        }

</head>

        // Currency formatter

            return '₹' + Math.round(num).toLocaleString('en-IN');

        // ====================================================
        // CHART REUSABLE COMPONENT
        // ====================================================
        const ChartComponent = ({ type, data, options, height = 250 }) => {
            const canvasRef = useRef(null);
            const chartInstanceRef = useRef(null);

            useEffect(() => {
                if (canvasRef.current) {
                    if (chartInstanceRef.current) {
                        chartInstanceRef.current.destroy();
                    }
                    const ctx = canvasRef.current.getContext('2d');
                    chartInstanceRef.current = new Chart(ctx, {
                        type: type,
                        data: data,
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            ...options
                        }
                    });
                }
                return () => {
                    if (chartInstanceRef.current) {
                        chartInstanceRef.current.destroy();
                    }
                };
            }, [type, data, options]);

            return (
                <div style={{ height: height, position: 'relative' }} className="w-full">
                    <canvas ref={canvasRef}></canvas>
                </div>
            );
        };

        // ====================================================
        // CORE APPLICATION CONTROLLER
        // ====================================================
        const ApexIntelApp = () => {
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem('apex_intel_state');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        // Ensure all structures are present
                        return { ...initialAppState, ...parsed };
                    } catch (e) {
                        return initialAppState;
                    }
                }
                return initialAppState;
            });

            const [activeTab, setActiveTab] = useState('budget');
            const [showQrModal, setShowQrModal] = useState(false);
            const [qrImageTag, setQrImageTag] = useState('');
            const [showScanner, setShowScanner] = useState(false);
            const [scanError, setScanError] = useState('');
            const [hoveredValue, setHoveredValue] = useState(null); // Local reveal value tracking

            // Auto-save state changes to client-side localStorage
            useEffect(() => {
                localStorage.setItem('apex_intel_state', JSON.stringify(state));
                // Sync class theme on documentElement
                document.documentElement.className = state.theme;
            }, [state]);

            // Register PWA Service Worker
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('./sw.js')
                        .then((reg) => console.log('Service Worker Registered!', reg))
                        .catch((err) => console.log('Service Worker Registration Failed:', err));
                }
            }, []);

            // Anti-Peeping Module 1: Double Escape Panic Redirection
            useEffect(() => {
                let lastEscTime = 0;
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        const now = Date.now();
                        if (now - lastEscTime < 500) {
                            // Immediate state wipe & redirection
                            localStorage.removeItem('apex_intel_state');
                            window.location.href = 'https://www.google.com';
                        }
                        lastEscTime = now;
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            // Translate helper
            const t = (key, replacements = {}) => {
                const activeLang = state.lang || 'en';
                let translation = i18n[activeLang]?.[key] || i18n['en']?.[key] || key;
                Object.keys(replacements).forEach(placeholder => {
                    translation = translation.replace(`{${placeholder}}`, replacements[placeholder]);
                });
                return translation;
            };

            // Mask numbers for Module 1
            const MaskValue = ({ value, isCurrency = true }) => {
                const [tempReveal, setTempReveal] = useState(false);
                const displayVal = isCurrency ? formatINR(value) : value;

                if (!state.privacyActive) {
                    return <span>{displayVal}</span>;
                }

                return (
                    <span 
                        className={`cursor-pointer transition-all ${tempReveal ? 'bg-transparent text-appText' : 'bg-appPrimary/20 text-appPrimary px-2 py-0.5 rounded font-mono select-none'}`}
                        onMouseEnter={() => setTempReveal(true)}
                        onMouseLeave={() => setTempReveal(false)}
                        onClick={() => setTempReveal(!tempReveal)}
                        title="Hover to temporarily reveal"
                    >
                        {tempReveal ? displayVal : "₹ * * * *"}
                    </span>
                );
            };

            // i18n switcher helper
            const handleLanguageChange = (langCode) => {
                setState(prev => ({ ...prev, lang: langCode }));
            };

            // Theme switcher helper
            const handleThemeChange = (themeName) => {
                setState(prev => ({ ...prev, theme: themeName }));
            };

            // Import JSON backup
            const handleImportJson = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        setState(prev => ({ ...prev, ...parsed }));
                        alert("Data loaded successfully!");
                    } catch (err) {
                        alert("Invalid JSON data format.");
                    }
                };
                reader.readAsText(file);
            };

            // Export JSON backup
            const handleExportJson = () => {
                const dataStr = JSON.stringify(state, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `apex_intel_backup.json`;
                link.click();
            };

            // QR Code Exporter
            const handleGenerateQr = () => {
                try {
                    // Extract core state to minimize QR size
                    const coreState = {
                        salary: state.salary,
                        otherIncome: state.otherIncome,
                        fixedExpenses: state.fixedExpenses,
                        variableExpenses: state.variableExpenses,
                        sinkingFunds: state.sinkingFunds,
                        assets: state.assets,
                        liabilities: state.liabilities,
                        documentVault: state.documentVault,
                        currentLiquidAssets: state.currentLiquidAssets,
                        fireFactor: state.fireFactor
                    };
                    const json = JSON.stringify(coreState);
                    const b64 = btoa(unescape(encodeURIComponent(json)));
                    
                    const qr = qrcode(0, 'L');
                    qr.addData(b64);
                    qr.make();
                    const tag = qr.createImgTag(5, 15);
                    setQrImageTag(tag);
                    setShowQrModal(true);
                } catch (err) {
                    alert("Error packing data: " + err.message);
                }
            };

            // QR Code Camera scanner controller
            const html5QrScannerRef = useRef(null);
            const startQrScanner = () => {
                setScanError('');
                setShowScanner(true);
                setTimeout(() => {
                    html5QrScannerRef.current = new Html5Qrcode("qr-scanner-viewport");
                    html5QrScannerRef.current.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: { width: 220, height: 220 } },
                        (decodedText) => {
                            try {
                                const jsonStr = decodeURIComponent(escape(atob(decodedText)));
                                const imported = JSON.parse(jsonStr);
                                setState(prev => ({ ...prev, ...imported }));
                                stopQrScanner();
                                alert("State synced successfully!");
                            } catch (e) {
                                setScanError("Failed to parse scan: invalid format.");
                            }
                        },
                        () => {}
                    ).catch(err => {
                        setScanError("Camera access failed or scanner already active.");
                    });
                }, 100);
            };

            const stopQrScanner = () => {
                if (html5QrScannerRef.current) {
                    html5QrScannerRef.current.stop().then(() => {
                        setShowScanner(false);
                    }).catch(() => {
                        setShowScanner(false);
                    });
                } else {
                    setShowScanner(false);
                }
            };

            // ====================================================
            // COMPUTED BUDGET & OPPORTUNITY METRICS
            // ====================================================
            const sinkingFundWithholding = useMemo(() => {
                const totalAnnual = state.sinkingFunds.reduce((sum, item) => sum + item.annualAmount, 0);
                return totalAnnual / 12;
            }, [state.sinkingFunds]);

            const budgetMetrics = useMemo(() => {
                const totalIncome = state.salary + state.otherIncome;
                const totalFixed = state.fixedExpenses.reduce((sum, item) => sum + item.amount, 0);
                
                // Subtract stress test deductions if applied
                let adjustedFixed = totalFixed;
                if (state.stressTestApplied.jobLoss) {
                    // Job loss creates monthly emergency cash deficit but does not alter baseline fixed obligations
                }

                const totalVariable = state.variableExpenses.reduce((sum, item) => sum + item.amount, 0);
                const totalExpenses = adjustedFixed + totalVariable + sinkingFundWithholding;
                const surplus = totalIncome - totalExpenses;

                // Financial Agility Score: portion of income not locked into fixed commitments
                const fixedRatio = totalIncome > 0 ? (totalFixed / totalIncome) * 100 : 100;
                const agilityScore = Math.max(0, 100 - fixedRatio);

                return { totalIncome, totalFixed, totalVariable, totalExpenses, surplus, agilityScore };
            }, [state.salary, state.otherIncome, state.fixedExpenses, state.variableExpenses, sinkingFundWithholding, state.stressTestApplied]);

            // Opportunity Buy Cost Calculation (12% compounding over 15 years = approx 5.9958x multiplier)
            const opportunityMultiplier = 5.9958;
            const impulseOppCost = state.impulseCost * opportunityMultiplier;
            const laborRatePerHour = state.salary / 160;
            const laborHoursRequired = laborRatePerHour > 0 ? state.impulseCost / laborRatePerHour : 0;

            // ====================================================
            // LIQUID NET WORTH & TANGIBLE CONVERSIONS
            // ====================================================
            const netWorthMetrics = useMemo(() => {
                let cashVal = state.assets.cash;
                let stocksVal = state.assets.stocks;
                let goldVal = state.assets.gold;
                let propertyVal = state.assets.property;
                let otherVal = state.assets.other;

                // Deduct stress test events directly from Cash reserve
                if (state.stressTestApplied.jobLoss) {
                    const cost = budgetMetrics.totalExpenses * 6;
                    cashVal = Math.max(-500000, cashVal - cost); // Cash can go negative, indicating debt burden
                }
                if (state.stressTestApplied.medicalEmergency) {
                    cashVal = Math.max(-500000, cashVal - 500000);
                }

                // Apply Haircuts (Module 4)
                if (state.applyHaircut) {
                    propertyVal = propertyVal * 0.80; // 20% discount
                    goldVal = goldVal * 0.95;       // 5% discount
                }

                const totalAssets = cashVal + stocksVal + goldVal + propertyVal + otherVal;
                const totalLiabilities = Object.values(state.liabilities).reduce((a, b) => a + b, 0);
                const netWorth = totalAssets - totalLiabilities;
                
                // True Liquid Net Worth (exclude Property and haircut gold/stocks if needed)
                const liquidAssets = cashVal + stocksVal + (state.applyHaircut ? goldVal : goldVal * 0.95);
                const trueLiquidNetWorth = liquidAssets - totalLiabilities;

                return { totalAssets, totalLiabilities, netWorth, trueLiquidNetWorth, cashVal };
            }, [state.assets, state.liabilities, state.applyHaircut, state.stressTestApplied, budgetMetrics]);

            // Tangible Translation milestones
            const tangibleTranslationMessage = useMemo(() => {
                const nw = netWorthMetrics.netWorth;
                if (nw < 50000) {
                    return "Equivalent to establishing a solid emergency reserve foundation.";
                } else if (nw >= 50000 && nw < 500000) {
                    return "Equivalent to 6 months of basic household groceries and utility coverage.";
                } else if (nw >= 500000 && nw < 2000000) {
                    return "Equivalent to a standard family health cover premium fully funded for 10 years.";
                } else if (nw >= 2000000 && nw < 15000000) {
                    return "Equivalent to 1 year of fully funded higher education abroad at a top institution.";
                } else {
                    return "Equivalent to a premium 2BHK residential flat in a Tier-1 Indian city paid entirely in cash.";
                }
            }, [netWorthMetrics.netWorth]);

            // FIRE Progress calculations
            const fireMetrics = useMemo(() => {
                const annualExpenses = budgetMetrics.totalExpenses * 12;
                const targetCorpus = annualExpenses * state.fireFactor;
                // SPEEDOMETER is mapped using true liquid assets over FIRE target corpus
                const liquidAssets = state.assets.cash + state.assets.stocks;
                const progressPct = targetCorpus > 0 ? Math.min(100, (liquidAssets / targetCorpus) * 100) : 0;
                return { targetCorpus, progressPct };
            }, [budgetMetrics.totalExpenses, state.fireFactor, state.assets]);

            // Stress test fail diagnostics
            const stressTestWarnings = useMemo(() => {
                const warnings = [];
                const cashBalance = netWorthMetrics.cashVal;
                if (cashBalance < 0) {
                    warnings.push(`Emergency cash exhausted! Deficit of ${formatINR(Math.abs(cashBalance))}. Savings goals cannot be funded.`);
                }
                return warnings;
            }, [netWorthMetrics.cashVal]);

            return (
                <div className="flex-1 flex flex-col justify-between">
                    
                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-center px-6 py-4 bg-appCard border-b border-appBorder shadow-glass z-10 gap-4">
                        <div className="flex items-center gap-3">
                            <img src="./icon.svg" className="w-10 h-10 filter drop-shadow-[0_0_10px_var(--glow)]" alt="Logo" />
                            <div>
                                <h1 className="text-2xl font-extrabold bg-gradient-to-r from-appPrimary to-purple-500 bg-clip-text text-transparent tracking-tight">
                                    {t('title')}
                                </h1>
                                <p className="text-[10px] text-appTextSec font-medium uppercase tracking-wider">{t('tagline')}</p>
                            </div>
                        </div>

                        {/* Control Bar: Theme switcher, Eye toggle, Language flags */}
                        <div className="flex flex-wrap items-center gap-3">
                            {/* Privacy Mode Eye Toggle */}
                            <button 
                                onClick={() => setState(prev => ({ ...prev, privacyActive: !prev.privacyActive }))}
                                className={`p-2 rounded-lg border transition-all ${state.privacyActive ? 'bg-red-500/20 border-red-500 text-red-400' : 'bg-appCard border-appBorder text-appTextSec hover:text-appText'}`}
                                title="Privacy Mode Toggle (Eye Icon)"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
                                    {state.privacyActive ? (
                                        <g>
                                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                            <line x1="1" y1="1" x2="23" y2="23"></line>
                                        </g>
                                    ) : (
                                        <g>
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </g>
                                    )}
                                </svg>
                            </button>

                            {/* Theme switcher */}
                            <select 
                                value={state.theme}
                                onChange={(e) => handleThemeChange(e.target.value)}
                                className="bg-appCard border border-appBorder text-appText rounded-lg py-1 px-2 text-xs focus:outline-none"
                            >
                                <option value="theme-emerald-matrix">Emerald Matrix</option>
                                <option value="theme-nordic-slate">Nordic Slate</option>
                                <option value="theme-midnight-cyber">Midnight Cyber</option>
                            </select>

                            {/* Language Dictionary switcher */}
                            <div className="flex gap-1 bg-appCard border border-appBorder rounded-lg p-0.5">
                                <button onClick={() => handleLanguageChange('en')} className={`px-2 py-1 text-[10px] font-bold rounded ${state.lang === 'en' ? 'bg-appPrimary text-white' : 'text-appTextSec'}`}>EN</button>
                                <button onClick={() => handleLanguageChange('kn')} className={`px-2 py-1 text-[10px] font-bold rounded ${state.lang === 'kn' ? 'bg-appPrimary text-white' : 'text-appTextSec'}`}>ಕನ್ನಡ</button>
                                <button onClick={() => handleLanguageChange('hi')} className={`px-2 py-1 text-[10px] font-bold rounded ${state.lang === 'hi' ? 'bg-appPrimary text-white' : 'text-appTextSec'}`}>हिंदी</button>
                                <button onClick={() => handleLanguageChange('ta')} className={`px-2 py-1 text-[10px] font-bold rounded ${state.lang === 'ta' ? 'bg-appPrimary text-white' : 'text-appTextSec'}`}>தமிழ்</button>
                                <button onClick={() => handleLanguageChange('te')} className={`px-2 py-1 text-[10px] font-bold rounded ${state.lang === 'te' ? 'bg-appPrimary text-white' : 'text-appTextSec'}`}>తెలుగు</button>
                            </div>

                            {/* Export / Sync Controls */}
                            <button onClick={handleExportJson} className="bg-appCard border border-appBorder hover:border-appPrimary text-appTextSec hover:text-appText text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-1">
                                {t('btn_export')}
                            </button>
                            <label className="bg-appCard border border-appBorder hover:border-appPrimary text-appTextSec hover:text-appText text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 cursor-pointer">
                                {t('btn_import')}
                                <input type="file" accept=".json" onChange={handleImportJson} className="hidden" />
                            </label>
                            <button onClick={handleGenerateQr} className="bg-appPrimary hover:bg-appPrimaryHover text-white text-[10px] font-bold px-3 py-1.5 rounded-lg">
                                {t('btn_show_qr')}
                            </button>
                            <button onClick={startQrScanner} className="bg-appCard border border-appPrimary hover:bg-appPrimary/10 text-appPrimary text-[10px] font-bold px-3 py-1.5 rounded-lg">
                                {t('btn_scan_qr')}
                            </button>
                        </div>
                    </header>

                    {/* Navigation Tabs */}
                    <nav className="flex overflow-x-auto whitespace-nowrap bg-appCard border-b border-appBorder shadow-sm scrollbar-none sticky top-0 z-10">
                        <button onClick={() => setActiveTab('budget')} className={`py-4 px-6 font-bold text-sm border-b-2 transition-all flex items-center gap-1.5 ${activeTab === 'budget' ? 'border-appPrimary text-appPrimary' : 'border-transparent text-appTextSec hover:text-appText'}`}>
                            📁 {t('tab_budget')}
                        </button>
                        <button onClick={() => setActiveTab('savings')} className={`py-4 px-6 font-bold text-sm border-b-2 transition-all flex items-center gap-1.5 ${activeTab === 'savings' ? 'border-appPrimary text-appPrimary' : 'border-transparent text-appTextSec hover:text-appText'}`}>
                            🎯 {t('tab_savings')}
                        </button>
                        <button onClick={() => setActiveTab('loan')} className={`py-4 px-6 font-bold text-sm border-b-2 transition-all flex items-center gap-1.5 ${activeTab === 'loan' ? 'border-appPrimary text-appPrimary' : 'border-transparent text-appTextSec hover:text-appText'}`}>
                            📊 {t('tab_loan')}
                        </button>
                        <button onClick={() => setActiveTab('growth')} className={`py-4 px-6 font-bold text-sm border-b-2 transition-all flex items-center gap-1.5 ${activeTab === 'growth' ? 'border-appPrimary text-appPrimary' : 'border-transparent text-appTextSec hover:text-appText'}`}>

                        <button onClick={() => setActiveTab('debt')} className={`py-4 px-6 font-bold text-sm border-b-2 transition-all flex items-center gap-1.5 ${activeTab === 'debt' ? 'border-appPrimary text-appPrimary' : 'border-transparent text-appTextSec hover:text-appText'}`}>
                            📉 {t('tab_debt')}
                        </button>
                        <button onClick={() => setActiveTab('networth')} className={`py-4 px-6 font-bold text-sm border-b-2 transition-all flex items-center gap-1.5 ${activeTab === 'networth' ? 'border-appPrimary text-appPrimary' : 'border-transparent text-appTextSec hover:text-appText'}`}>
                            🏛️ {t('tab_networth')}
                        </button>
                        <button onClick={() => setActiveTab('stresstest')} className={`py-4 px-6 font-bold text-sm border-b-2 transition-all flex items-center gap-1.5 ${activeTab === 'stresstest' ? 'border-appPrimary text-appPrimary' : 'border-transparent text-appTextSec hover:text-appText'}`}>
                            ⚡ {t('tab_stresstest')}
                        </button>
                        <button onClick={() => setActiveTab('vault')} className={`py-4 px-6 font-bold text-sm border-b-2 transition-all flex items-center gap-1.5 ${activeTab === 'vault' ? 'border-appPrimary text-appPrimary' : 'border-transparent text-appTextSec hover:text-appText'}`}>
                            🔒 {t('tab_vault')}
                        </button>
                    </nav>

                    {/* Main Container */}
                    <main className="container mx-auto max-w-7xl flex-1 px-4 py-8">
                        
                        {/* TAB 1: BUDGET PLANNER */}
                        {activeTab === 'budget' && (
                            <div className="slide-up grid grid-cols-1 lg:grid-cols-3 gap-6">
                                
                                {/* Inputs side */}
                                <div className="card lg:col-span-1 space-y-6">
                                    <h2 className="text-xl font-bold border-b border-appBorder pb-2">💵 {t('tab_budget')}</h2>
                                    
                                    <div className="input-group">
                                        <label className="text-xs text-appTextSec uppercase font-bold tracking-wider mb-2 block">{t('salary_label')}</label>
                                        <input 
                                            type="number" 
                                            value={state.salary} 
                                            onChange={(e) => setState(prev => ({ ...prev, salary: Number(e.target.value) }))}
                                            className="bg-appBg border border-appBorder text-appText focus:border-appPrimary px-4 py-2 rounded-lg w-full"
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label className="text-xs text-appTextSec uppercase font-bold tracking-wider mb-2 block">{t('other_income_label')}</label>
                                        <input 
                                            type="number" 
                                            value={state.otherIncome} 
                                            onChange={(e) => setState(prev => ({ ...prev, otherIncome: Number(e.target.value) }))}
                                            className="bg-appBg border border-appBorder text-appText focus:border-appPrimary px-4 py-2 rounded-lg w-full"
                                        />
                                    </div>

                                    {/* Sinking Funds Ledger Module 4 */}
                                    <div className="space-y-4 pt-4 border-t border-appBorder">
                                        <div className="flex justify-between items-center">
                                            <h3 className="font-bold text-sm flex items-center gap-2">
                                                📅 {t('sinking_fund_title')}
                                                <span className="tooltip-container">
                                                    <span className="pulse-guide cursor-help"></span>
                                                    <span className="tooltip-text">Accumulates irregular yearly costs (insurance, tax) to compute a standard monthly withholding reserve.</span>
                                                </span>
                                            </h3>
                                        </div>
                                        <div className="space-y-2">
                                            {state.sinkingFunds.map(fund => (
                                                <div key={fund.id} className="flex justify-between items-center bg-appBg/50 p-2 rounded-lg border border-appBorder text-xs">
                                                    <div>
                                                        <div className="font-bold">{fund.name}</div>
                                                        <div className="text-appTextSec">{t('sinking_withholding', { val: Math.round(fund.annualAmount/12) })}</div>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="font-bold text-appPrimary"><MaskValue value={fund.annualAmount} /></span>
                                                        <button 
                                                            onClick={() => setState(prev => ({ ...prev, sinkingFunds: prev.sinkingFunds.filter(f => f.id !== fund.id) }))}
                                                            className="text-red-500 hover:text-red-400"
                                                        >
                                                            ❌
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            <input 
                                                id="newSinkingName" 
                                                type="text" 
                                                placeholder={t('annual_expense_name')} 
                                                className="bg-appBg border border-appBorder text-xs p-2 rounded w-1/2"
                                            />
                                            <input 
                                                id="newSinkingAmt" 
                                                type="number" 
                                                placeholder={t('annual_amount')} 
                                                className="bg-appBg border border-appBorder text-xs p-2 rounded w-1/4"
                                            />
                                            <button 
                                                onClick={() => {
                                                    const nameEl = document.getElementById('newSinkingName');
                                                    const amtEl = document.getElementById('newSinkingAmt');
                                                    if (nameEl.value && amtEl.value) {
                                                        setState(prev => ({
                                                            ...prev,
                                                            sinkingFunds: [...prev.sinkingFunds, { id: Date.now(), name: nameEl.value, annualAmount: Number(amtEl.value) }]
                                                        }));
                                                        nameEl.value = '';
                                                        amtEl.value = '';
                                                    }
                                                }}
                                                className="bg-appPrimary text-white font-bold text-xs px-3 rounded flex-1"
                                            >
                                                +
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Outputs & Agility Score */}
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        <div className="bg-appCard p-4 rounded-xl border border-appBorder">
                                            <div className="text-[10px] uppercase font-bold tracking-wider text-appTextSec">Total Income</div>
                                            <div className="text-xl font-extrabold text-appPrimary"><MaskValue value={budgetMetrics.totalIncome} /></div>
                                        </div>
                                        <div className="bg-appCard p-4 rounded-xl border border-appBorder">
                                            <div className="text-[10px] uppercase font-bold tracking-wider text-appTextSec">{t('fixed_costs')}</div>
                                            <div className="text-xl font-extrabold text-red-500"><MaskValue value={budgetMetrics.totalFixed} /></div>
                                        </div>
                                        <div className="bg-appCard p-4 rounded-xl border border-appBorder">
                                            <div className="text-[10px] uppercase font-bold tracking-wider text-appTextSec">{t('variable_costs')}</div>
                                            <div className="text-xl font-extrabold text-appText"><MaskValue value={budgetMetrics.totalVariable} /></div>
                                        </div>
                                        <div className="bg-appCard p-4 rounded-xl border border-appBorder">
                                            <div className="text-[10px] uppercase font-bold tracking-wider text-appTextSec">{t('surplus_label')}</div>
                                            <div className="text-xl font-extrabold text-emerald-500"><MaskValue value={budgetMetrics.surplus} /></div>
                                        </div>
                                    </div>

                                    {/* Behavioral Budgeting Module 2 */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        
                                        {/* Financial Agility Score Card */}
                                        <div className="card space-y-4">
                                            <h3 className="font-bold flex items-center gap-2">
                                                ⚡ {t('agility_score')}
                                                <span className="tooltip-container">
                                                    <span className="pulse-guide cursor-help"></span>
                                                    <span className="tooltip-text">{t('agility_tooltip')}</span>
                                                </span>
                                            </h3>
                                            <div className="flex items-center justify-between">
                                                <div className="text-3xl font-extrabold text-appPrimary">{Math.round(budgetMetrics.agilityScore)}%</div>
                                                <div className="text-xs font-semibold px-3 py-1 bg-appPrimary/10 text-appText rounded-full">
                                                    {budgetMetrics.agilityScore > 60 ? "Excellent" : budgetMetrics.agilityScore >= 40 ? "Moderate" : "Vulnerable!"}
                                                </div>
                                            </div>
                                            <div className="w-full bg-appBg h-3 rounded-full overflow-hidden border border-appBorder">
                                                <div 
                                                    className="h-full bg-appPrimary transition-all" 
                                                    style={{ width: `${budgetMetrics.agilityScore}%` }}
                                                ></div>
                                            </div>
                                            <p className="text-xs text-appTextSec">
                                                {budgetMetrics.agilityScore > 60 
                                                    ? "Excellent Agility. Your fixed commitments are low. You can easily navigate salary disruptions." 
                                                    : budgetMetrics.agilityScore >= 40 
                                                        ? "Moderate Agility. Monitor your fixed costs. Try to avoid adding new long-term EMIs."
                                                        : "Low Agility Risk! A high percentage of your income is locked in fixed commitments. You are highly vulnerable to job loss."}
                                            </p>
                                            <div className="text-xs text-appTextSec border-t border-appBorder pt-2 flex justify-between">
                                                <span>{t('sinking_fund_deduction')}:</span>
                                                <span className="font-bold text-appText"><MaskValue value={sinkingFundWithholding} /></span>
                                            </div>
                                        </div>

                                        {/* Impulse Buy Opportunity Cost Card */}
                                        <div className="card space-y-4">
                                            <h3 className="font-bold">🛍️ {t('impulse_title')}</h3>
                                            <div className="input-group">
                                                <label className="text-[10px] text-appTextSec uppercase font-bold tracking-wider mb-2 block">{t('item_cost')}</label>
                                                <input 
                                                    type="number" 
                                                    value={state.impulseCost}
                                                    onChange={(e) => setState(prev => ({ ...prev, impulseCost: Number(e.target.value) }))}
                                                    className="bg-appBg border border-appBorder text-xs px-3 py-1.5 rounded-lg w-full text-appText" 
                                                />
                                            </div>
                                            
                                            <div className="space-y-3 bg-appBg/50 p-4 rounded-xl border border-appBorder">
                                                <div>
                                                    <div className="text-[10px] text-appTextSec uppercase font-bold tracking-wider">{t('labor_cost_calc')}</div>
                                                    <p className="text-xs font-semibold text-appText">
                                                        {t('labor_hours_msg', { hours: laborHoursRequired.toFixed(1), rate: Math.round(laborRatePerHour) })}
                                                    </p>
                                                </div>
                                                <div className="border-t border-appBorder pt-2">
                                                    <div className="text-[10px] text-appTextSec uppercase font-bold tracking-wider">{t('opportunity_cost_calc')}</div>
                                                    <p className="text-xs font-semibold text-appPrimary">
                                                        {t('opp_cost_msg', { val: formatINR(impulseOppCost) })}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Breakdown tables for expenses */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="card space-y-3">
                                            <h3 className="font-bold text-sm border-b border-appBorder pb-2">🔒 {t('fixed_costs')}</h3>
                                            <div className="space-y-2">
                                                {state.fixedExpenses.map(exp => (
                                                    <div key={exp.id} className="flex justify-between items-center text-xs">
                                                        <span className="text-appTextSec">{exp.name}</span>
                                                        <div className="flex gap-2 items-center">
                                                            <span className="font-semibold"><MaskValue value={exp.amount} /></span>
                                                            <button 
                                                                onClick={() => setState(prev => ({ ...prev, fixedExpenses: prev.fixedExpenses.filter(e => e.id !== exp.id) }))}

                                                                ❌
                                                            </button>

                                                <div className="flex gap-2 pt-2">

                                        />
                                        <label htmlFor="checkPass" className="text-xs font-semibold cursor-pointer">
                                            Secure Folder Credentials shared with Trusted Family Member
                                        </label>
                                    </div>

                                    <div className="flex items-center gap-3 p-3 bg-appBg/50 rounded-lg border border-appBorder">
                                        <input 
                                            type="checkbox" 
                                            checked={state.documentVault.healthCardsPrinted}
                                            onChange={(e) => setState(prev => ({ ...prev, documentVault: { ...prev.documentVault, healthCardsPrinted: e.target.checked } }))}
                                            className="w-4 h-4 rounded text-appPrimary focus:ring-0 cursor-pointer"
                                            id="checkHealth"
                                        />
                                        <label htmlFor="checkHealth" className="text-xs font-semibold cursor-pointer">
                                            Physical Health Cards Printed & Placed in Emergency Bag
                                        </label>
                                    </div>

                                    <div className="flex items-center gap-3 p-3 bg-appBg/50 rounded-lg border border-appBorder">
                                        <input 
                                            type="checkbox" 
                                            checked={state.documentVault.bankNomineeAdded}
                                            onChange={(e) => setState(prev => ({ ...prev, documentVault: { ...prev.documentVault, bankNomineeAdded: e.target.checked } }))}
                                            className="w-4 h-4 rounded text-appPrimary focus:ring-0 cursor-pointer"
                                            id="checkBank"
                                        />
                                        <label htmlFor="checkBank" className="text-xs font-semibold cursor-pointer">
                                            Nominees Registered for all active Bank Accounts
                                        </label>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* QR Code Exporter Modal */}
                    {showQrModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                            <div className="bg-appCard border border-appBorder p-6 rounded-2xl max-w-sm w-full space-y-4 text-center slide-up">
                                <h3 className="font-bold text-lg">{t('sync_title')}</h3>
                                <p className="text-xs text-appTextSec">{t('show_qr_code')}</p>
                                <div className="bg-white p-4 rounded-xl flex justify-center inline-block" dangerouslySetInnerHTML={{ __html: qrImageTag }}></div>
                                <button onClick={() => setShowQrModal(false)} className="bg-appPrimary text-white font-bold py-2 w-full rounded-lg text-xs">
                                    Close
                                </button>
                            </div>
                        </div>
                    )}

                    {/* QR Code Scanner Overlay */}
                    {showScanner && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="bg-appCard border border-appBorder p-6 rounded-2xl max-w-sm w-full space-y-4 text-center slide-up">
                                <h3 className="font-bold text-lg">{t('scan_webcam')}</h3>
                                <div id="qr-scanner-viewport" className="w-full h-64 bg-black rounded-lg overflow-hidden border border-appBorder"></div>
                                {scanError && <p className="text-xs text-red-500">{scanError}</p>}
                                <button onClick={stopQrScanner} className="bg-red-500 hover:bg-red-600 text-white font-bold py-2 w-full rounded-lg text-xs">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="text-center py-6 border-t border-appBorder text-[10px] text-appTextSec bg-appCard">
                        This toolkit operates strictly locally inside your browser client. No analytics, tracking or databases are active. Built for high-privacy financial planning.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ApexIntelApp />);
    </script>
</body>
</html>
