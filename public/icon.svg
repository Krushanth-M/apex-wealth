<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="128" stroke="#e2e8f0" stroke-width="8" />
  <!-- Logo geometry -->
  <g transform="translate(256, 256)">
    <!-- Outer hexagonal shield -->
    <polygon points="0,-160 138,-80 138,80 0,160 -138,80 -138,-80" fill="none" stroke="url(#grad)" stroke-width="24" stroke-linejoin="round" filter="url(#glow)" />
    <!-- Inner backing -->
    <polygon points="0,-130 112,-65 112,65 0,130 -112,65 -112,-65" fill="url(#grad)" opacity="0.1" />
    <!-- Monogram letters A and I interlocked inside -->
    <path d="M-40,50 L0,-30 L40,50" fill="none" stroke="#1e293b" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M-22,15 L22,15" fill="none" stroke="#1e293b" stroke-width="16" stroke-linecap="round" />
    <!-- Interlocking center line of I -->
    <line x1="0" y1="-50" x2="0" y2="40" stroke="url(#grad)" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
